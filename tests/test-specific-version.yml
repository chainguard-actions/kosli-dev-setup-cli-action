name: Test specific version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: "2.11.1"
      - name: Assert version output matches requested version
        env:
          ACTUAL: ${{ steps.action.outputs.version }}
        run: |
          echo "actual version: $ACTUAL"
          if [ "$ACTUAL" != "2.11.1" ]; then
            echo "FAIL: expected version '2.11.1' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS: version output matches '2.11.1'"
      - name: Assert kosli CLI is installed and reports correct version
        run: |
          if ! command -v kosli &>/dev/null; then
            echo "FAIL: kosli CLI not found in PATH"
            exit 1
          fi
          INSTALLED_VERSION=$(kosli version --output json 2>/dev/null | grep -oP '"version"\s*:\s*"\K[^"]+' || kosli version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "installed version: $INSTALLED_VERSION"
          if [ -z "$INSTALLED_VERSION" ]; then
            echo "WARN: could not parse version from kosli output, but CLI is present"
          elif [ "$INSTALLED_VERSION" != "2.11.1" ]; then
            echo "FAIL: expected installed version '2.11.1' but got '$INSTALLED_VERSION'"
            exit 1
          fi
          echo "PASS: kosli CLI version verified"
