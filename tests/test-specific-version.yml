name: Test install specific Kosli CLI version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: "2.11.1"
      - name: Assert version output matches requested version
        env:
          VERSION_OUT: ${{ steps.action.outputs.version }}
        run: |
          echo "version output: $VERSION_OUT"
          if [ "$VERSION_OUT" != "2.11.1" ]; then
            echo "FAIL: expected version output '2.11.1', got '$VERSION_OUT'"
            exit 1
          fi
          echo "PASS: version output is '2.11.1'"
      - name: Assert kosli CLI is installed and executable
        run: |
          if ! command -v kosli &>/dev/null; then
            echo "FAIL: kosli command not found in PATH"
            exit 1
          fi
          echo "PASS: kosli is available at $(command -v kosli)"
      - name: Assert installed version is correct
        run: |
          INSTALLED=$(kosli version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "installed version: $INSTALLED"
          if [ "$INSTALLED" != "2.11.1" ]; then
            echo "FAIL: expected installed version '2.11.1', got '$INSTALLED'"
            exit 1
          fi
          echo "PASS: installed version is '2.11.1'"
