name: Test basic usage (latest version)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: latest
      - name: Assert version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.version }}
        run: |
          echo "actual version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected version output to be non-empty"
            exit 1
          fi
          echo "PASS: version output is '$ACTUAL'"
      - name: Assert kosli CLI is installed
        run: |
          if ! command -v kosli &>/dev/null; then
            echo "FAIL: kosli CLI not found in PATH"
            exit 1
          fi
          echo "PASS: kosli is installed at $(command -v kosli)"
          kosli version
